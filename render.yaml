services:
  # Backend API
  - type: web
    name: png2vector-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://png2vector.onrender.com

  # Frontend static site
  - type: web
    name: png2vector
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://png2vector-api.onrender.com
